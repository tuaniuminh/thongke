<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FamiLife - Đang chuyển hướng...</title>
    <script type="text/javascript">
        // Chuyển hướng người dùng từ một đường dẫn ảo (vd: /tongquan) về trang chủ với mã hash (/#tongquan)
        var path = window.location.pathname.split('/').filter(Boolean).pop();
        if (path && !path.endsWith('.html')) {
            var origin = window.location.origin;
            var basePath = window.location.pathname.replace('/' + path, '');
            if (!basePath.endsWith('/')) basePath += '/';
            window.location.replace(origin + basePath + '#' + path + window.location.search);
        } else {
            window.location.replace('/#');
        }
    </script>
</head>
<body>
    <div style="font-family: sans-serif; text-align: center; margin-top: 50px; color: #64748b;">
        <h2>Đang chuyển hướng đến FamiLife...</h2>
        <p>Nếu không tự động chuyển hướng, vui lòng bấm <a href="/">vào đây</a>.</p>
    </div>
</body>
</html>
