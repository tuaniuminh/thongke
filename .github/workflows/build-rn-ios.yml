name: Build React Native iOS IPA (Ad-Hoc for TrollStore)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-rn-ios:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node Modules
        run: |
          cd FamiLife-ReactNative
          npm install

      - name: Run Expo Prebuild
        run: |
          cd FamiLife-ReactNative
          npx expo prebuild --platform ios

      - name: Build Xcode Project
        run: |
          cd FamiLife-ReactNative
          xcodebuild -workspace ios/FamiLife.xcworkspace \
                     -scheme FamiLife \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     clean build

      - name: Ad-Hoc Sign App Bundle
        run: |
          codesign --force --sign - --deep --entitlements ios-build-entitlements.plist FamiLife-ReactNative/build/Build/Products/Release-iphoneos/FamiLife.app

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r FamiLife-ReactNative/build/Build/Products/Release-iphoneos/FamiLife.app Payload/
          zip -r "FamiLife_ReactNative.ipa" Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FamiLife-ReactNative-iOS
          path: FamiLife_ReactNative.ipa
          if-no-files-found: error
