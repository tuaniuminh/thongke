name: Build Windows App (Tauri)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject Supabase Secrets
        shell: bash
        run: |
          URL_VAL="${{ secrets.VITE_SUPABASE_URL }}"
          if [ -z "$URL_VAL" ]; then
            URL_VAL="${{ vars.VITE_SUPABASE_URL }}"
          fi

          KEY_VAL="${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          if [ -z "$KEY_VAL" ]; then
            KEY_VAL="${{ vars.VITE_SUPABASE_ANON_KEY }}"
          fi

          # Thay thế placeholders trong src/core/app.js
          sed -i "s|VITE_SUPABASE_URL_PLACEHOLDER|$URL_VAL|g" src/core/app.js
          sed -i "s|VITE_SUPABASE_ANON_KEY_PLACEHOLDER|$KEY_VAL|g" src/core/app.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: |
          npm install

      - name: Prepare Web Assets
        run: |
          npm run prepare-dist

      - name: Build Tauri App
        run: |
          npx @tauri-apps/cli@1 build

      - name: Upload Windows Installer (.msi)
        uses: actions/upload-artifact@v4
        with:
          name: FamiLife-Windows-Installer
          path: src-tauri/target/release/bundle/msi/*.msi
